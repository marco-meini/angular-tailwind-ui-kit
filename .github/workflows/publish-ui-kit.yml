name: Publish UI Kit

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Test UI Kit
        run: npm run test:ui-kit

      - name: Build UI Kit
        run: npm run build:ui-kit

      - name: Prepare package metadata for GitHub Packages
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ inputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const p = 'dist/ui-kit/package.json';
          const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
          pkg.name = '@' + process.env.REPO_OWNER + '/angular-tailwind-ui-kit';
          pkg.version = process.env.VERSION;
          pkg.publishConfig = { ...(pkg.publishConfig || {}), registry: 'https://npm.pkg.github.com' };
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          console.log('Prepared package', pkg.name, pkg.version);
          "

      - name: Publish to GitHub Packages
        run: npm publish ./dist/ui-kit --access public
