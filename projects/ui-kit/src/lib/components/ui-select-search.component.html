    <ui-combobox
      [label]="label"
      [placeholder]="placeholder"
      [options]="options"
      [nullable]="nullable"
      [nullMenuOption]="nullMenuOption"
      [nullLabel]="nullLabel"
      [variant]="variant"
      [size]="size"
      [state]="state"
      [disabled]="disabled"
      [invalid]="invalid"
      [loading]="loading"
      [value]="value"
      (valueChange)="onValueChange($event)"
      (queryChange)="queryChange.emit($event)"
    />
