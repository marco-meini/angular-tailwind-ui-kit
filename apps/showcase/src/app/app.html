<main class="min-h-screen bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-950">
    <div class="mx-auto flex max-w-[1200px] items-center justify-between px-6 py-4">
      <div>
        <p class="text-xs uppercase tracking-wide text-slate-400">Angular + Tailwind</p>
        <h1 class="text-xl font-semibold text-slate-100">UI Kit Component Explorer</h1>
      </div>
      <p class="text-sm text-slate-400">1 component per page</p>
    </div>
  </header>

  <section class="mx-auto grid max-w-[1200px] gap-6 px-6 py-6 lg:grid-cols-[280px_1fr]">
    <aside class="h-fit rounded-xl border border-slate-800 bg-slate-900 p-3 lg:sticky lg:top-6">
      <h2 class="px-2 pb-2 text-xs font-semibold uppercase tracking-wide text-slate-400">All components</h2>
      <nav class="space-y-1">
        @for (item of catalog; track item.id) {
          <a
            [routerLink]="['/components', item.id]"
            routerLinkActive="bg-cyan-500/20 text-cyan-200"
            class="block rounded-md px-3 py-2 text-sm text-slate-300 hover:bg-slate-800"
          >
            {{ item.label }}
          </a>
        }
      </nav>
    </aside>

    <section class="min-w-0">
      <router-outlet />
    </section>
  </section>
</main>
