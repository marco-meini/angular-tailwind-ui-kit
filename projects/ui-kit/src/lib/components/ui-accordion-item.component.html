    <article [class]="containerClasses()">
      <button
        type="button"
        class="flex w-full items-center justify-between p-4 text-left font-medium"
        [attr.aria-expanded]="open()"
        (click)="toggle()"
      >
        {{ title }}
        <span aria-hidden="true">{{ open() ? '−' : '+' }}</span>
      </button>
      @if (open()) {
        <div class="px-4 pb-4 text-sm text-slate-600">
          <ng-content />
        </div>
      }
    </article>
