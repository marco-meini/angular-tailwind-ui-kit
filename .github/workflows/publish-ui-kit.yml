name: Publish UI Kit

on:
  push:
    paths:
      - projects/ui-kit/package.json
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Detect version change
        if: github.event_name == 'push'
        id: version_check
        run: |
          PREV="$(git show "${{ github.event.before }}:projects/ui-kit/package.json" 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version" || true)"
          CURR="$(node -p "require('./projects/ui-kit/package.json').version")"
          if [ -n "$PREV" ] && [ "$PREV" = "$CURR" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURR), publish will be skipped."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${PREV:-<none>} -> $CURR"
          fi

      - name: Test UI Kit
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        run: npm run test:ui-kit

      - name: Build UI Kit
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        run: npm run build:ui-kit

      - name: Resolve publish version
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        id: publish_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
          else
            VER="$(node -p "require('./projects/ui-kit/package.json').version")"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VER}"

      - name: Prepare package metadata for GitHub Packages
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.publish_version.outputs.version }}
        run: |
          node -e "
          const fs = require('fs');
          const p = 'dist/ui-kit/package.json';
          const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
          pkg.name = '@' + process.env.REPO_OWNER + '/angular-tailwind-ui-kit';
          pkg.version = process.env.VERSION;
          pkg.publishConfig = { ...(pkg.publishConfig || {}), registry: 'https://npm.pkg.github.com' };
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          console.log('Prepared package', pkg.name, pkg.version);
          "

      - name: Publish to GitHub Packages
        if: github.event_name == 'workflow_dispatch' || steps.version_check.outputs.changed == 'true'
        run: npm publish ./dist/ui-kit --access public
